server:
  applicationConnectors:
    - type: http
      port: ${MARQUEZ_PORT:-5000}
  adminConnectors:
    - type: http
      port: ${MARQUEZ_ADMIN_PORT:-5001}

db:
  driverClass: org.postgresql.Driver
  url: jdbc:postgresql://${POSTGRES_HOST:-postgresql}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-marquez}
  user: ${POSTGRES_USER:-hive}
  password: ${POSTGRES_PASSWORD:-hive}

migrateOnStartup: true
